name: Build macOS DYLIB

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest  # Apple Silicon, fast provisioning — cross-compiles to x86_64
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build executor.dylib (x86_64, macOS 10.13+)
        run: |
          cd MacOS
          clang++ -std=c++17 -O2 -shared -dynamiclib \
            -mmacosx-version-min=10.13 \
            -arch x86_64 \
            -framework CoreFoundation \
            -framework Security \
            -o executor.dylib \
            executor.cpp
          codesign -f -s - executor.dylib
          file executor.dylib
          codesign -dv executor.dylib 2>&1 || true

      - name: Build external dumper (x86_64, macOS 10.13+)
        run: |
          cd "MacOS external"
          clang++ -std=c++17 -O2 \
            -mmacosx-version-min=10.13 \
            -arch x86_64 \
            -o dumper \
            dumper.cpp
          codesign -f -s - dumper
          file dumper
          codesign -dv dumper 2>&1 || true

      - name: Delete old release (if exists)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true

      - name: Create new release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest \
            --title "wadiwad macOS executor & external dumper" \
            --notes "Auto-built executor.dylib and dumper for Intel macOS 10.13+" \
            --latest \
            MacOS/executor.dylib \
            MacOS/send.sh \
            "MacOS external/dumper" \
            "MacOS external/start.sh"
